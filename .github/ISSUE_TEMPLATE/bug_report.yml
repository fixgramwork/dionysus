name: 버그 제보
description: 잘못된 동작, 오류 결과, 회귀를 제보합니다.
title: "[버그] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        재현 가능한 정보와 기대 동작을 함께 적어주세요.
        아직 구현되지 않은 아이디어라면 `기능/구조 제안` 또는 `작업 계획` 템플릿이 더 적합합니다.
  - type: textarea
    id: current_behavior
    attributes:
      label: 현재 동작
      description: 실제로 어떤 문제가 발생했는지 적어주세요.
      placeholder: 로그인 버튼을 눌러도 다음 화면으로 이동하지 않습니다.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 가능한 한 짧고 정확하게 적어주세요.
      placeholder: |
        1. ...로 이동
        2. ...를 실행
        3. ...가 발생
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: 기대 동작
      description: 원래 어떻게 동작해야 하는지 적어주세요.
      placeholder: 로그인 성공 후 대시보드로 이동해야 합니다.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: 환경 / 버전
      description: 문제가 발생한 환경을 적어주세요.
      placeholder: macOS 15, Chrome 135, commit abc123
  - type: textarea
    id: evidence
    attributes:
      label: 로그 / 스크린샷 / 참고 링크
      description: 확인에 도움이 되는 자료가 있으면 첨부해주세요.
      placeholder: 에러 로그, 캡처 이미지, 관련 이슈 링크 등
  - type: checkboxes
    id: checks
    attributes:
      label: 확인 사항
      options:
        - label: 이미 등록된 이슈가 없는지 확인했습니다.
          required: true
        - label: 첨부한 로그와 이미지에서 민감정보를 제거했습니다.
          required: true
