name: 작업 계획
description: 초기 스캐폴드, 문서, 설정, 운영 작업을 작은 단위로 정리합니다.
title: "[task] "
body:
  - type: markdown
    attributes:
      value: |
        이 템플릿은 구현 전에 해야 할 준비 작업이나, 구현 중 생긴 독립 작업을 정리할 때 사용합니다.
        한 이슈 안에서 끝낼 수 있는 크기로 나누는 것이 좋습니다.
  - type: textarea
    id: context
    attributes:
      label: 배경
      description: 왜 지금 이 작업이 필요한지 적어주세요.
      placeholder: 부트 가능한 최소 경로는 있지만, 다음 작업자가 바로 이어서 개발하기엔 규칙과 검증 루틴이 부족합니다.
    validations:
      required: true
  - type: textarea
    id: goal
    attributes:
      label: 목표
      description: 이 이슈가 완료되면 어떤 상태여야 하는지 적어주세요.
      placeholder: 새로운 기여자가 이슈와 규칙 문서만 보고 변경 범위, 검증 방법, PR 작성 방식을 바로 따라갈 수 있어야 합니다.
    validations:
      required: true
  - type: textarea
    id: tasks
    attributes:
      label: 작업 목록
      description: 체크리스트 형태로 작성해주세요.
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true
  - type: textarea
    id: done_criteria
    attributes:
      label: 완료 조건
      description: 어떤 상태가 되면 이슈를 닫을 수 있는지 적어주세요.
      placeholder: |
        - [ ] 관련 문서가 갱신된다.
        - [ ] 후속 작업이 필요한 경우 새 이슈로 분리된다.
        - [ ] 다음 작업자가 이어서 진행할 정보가 남는다.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 이슈, PR, 문서, 외부 링크가 있으면 적어주세요.
      placeholder: 관련 이슈 링크, docs/conventions 문서, README, 구현 예시 등
  - type: checkboxes
    id: checks
    attributes:
      label: 확인 사항
      options:
        - label: 이 작업이 다른 기존 이슈와 중복되지 않는지 확인했습니다.
          required: true
        - label: 한 번의 PR로 처리 가능한 범위로 쪼갰습니다.
          required: true
