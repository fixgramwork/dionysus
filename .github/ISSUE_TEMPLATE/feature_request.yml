name: 기능/구조 제안
description: 새로운 기능, 사용자 흐름, 구조 변경을 제안합니다.
title: "[제안] "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        "왜 필요한가"와 "어떻게 완료로 볼 것인가"를 같이 적어주세요.
        구현에 바로 들어갈 수 있을 만큼 범위를 좁히는 것이 목표입니다.
  - type: textarea
    id: background
    attributes:
      label: 배경
      description: 현재 어떤 문제나 기회가 있는지 적어주세요.
      placeholder: 현재 README에는 실행 가능한 스캐폴드가 없어 첫 기여 지점이 모호합니다.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 제안
      description: 원하는 변경을 구체적으로 적어주세요.
      placeholder: 초기 스캐폴드, 실행 가이드, 기본 품질 게이트를 함께 추가합니다.
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: 범위
      description: 이번 이슈에 포함할 내용과 제외할 내용을 적어주세요.
      placeholder: |
        포함:
        - ...
        - ...

        제외:
        - ...
  - type: textarea
    id: done_criteria
    attributes:
      label: 완료 조건
      description: 이 이슈가 닫혀도 되는 기준을 적어주세요.
      placeholder: |
        - [ ] 로컬에서 최소 실행 경로가 문서화된다.
        - [ ] 관련 README 섹션이 갱신된다.
        - [ ] 후속 이슈 없이도 다음 작업자가 이어서 진행할 수 있다.
    validations:
      required: true
  - type: textarea
    id: task_list
    attributes:
      label: 작업 초안
      description: 작업 단위를 체크리스트 형태로 나눠주세요.
      placeholder: |
        - [ ] 작업 1
        - [ ] 작업 2
        - [ ] 작업 3
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: 참고 자료
      description: 관련 링크, 문서, 기존 이슈가 있으면 적어주세요.
      placeholder: README, 외부 레퍼런스, 관련 이슈 링크 등
  - type: checkboxes
    id: checks
    attributes:
      label: 확인 사항
      options:
        - label: README의 현재 범위와 로드맵을 확인했습니다.
          required: true
        - label: 범위 밖 작업은 별도 이슈로 분리할 예정입니다.
          required: true
